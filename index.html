<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>2048</title>

    <!-- Bootstrap -->
    <link href="bower_components/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="bower_components/font-awesome/css/font-awesome.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/main.css?v=2026-06-24">

    <link rel="shortcut icon" href="assets/ico/favicon.ico">
  </head>
  <body>
    <div class="container">
      <div id="game-heading">
        <h1 id="game-title">2048</h1>
        <div id="scores">
          <div class="score-box" id="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="score-value">0</div>
          </div>
          <div class="score-box" id="best-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="best-value">0</div>
          </div>
        </div>
      </div>

      <div id="game-toolbar">
        <p id="game-intro">Join the numbers and get to the <strong>2048</strong> tile!</p>
        <button id="restart-button" class="btn btn-success"><i class="fa fa-refresh" aria-hidden="true"></i> New Game</button>
      </div>

      <div id="game-container">
        <div id="game-message">
          <p id="game-message-text"></p>
          <button id="retry-button" class="btn btn-success">Try again</button>
        </div>
        <div id="grid-container"></div>
        <div id="tile-container"></div>
      </div>
    </div>
    <footer>
      <div class="container">
        <div class="pull-left">
          <span>Powered by:</span>
          <i class="fa fa-hashtag" aria-hidden="true"></i><a target="_blank" href="http://getbootstrap.com/" title="Bootstrap">Bootstrap</a>
          <i class="fa fa-hashtag" aria-hidden="true"></i><a target="_blank" href="https://jquery.com/" title="jQuery">jQuery</a>
          <i class="fa fa-hashtag" aria-hidden="true"></i><a target="_blank" href="http://fontawesome.io/icons/" title="Font Awesome 4.6.3">FontAwesome</a>

        </div>
        <div class="pull-right">
          <span>Created by:</span>
          <a target="_blank" href="http://gunis.sk" title="gunis | sk * Freelancer &amp; Webdeveloper">Juraj Guniš</a>
        </div>
      </div>
    </footer>

    <!-- jquery.min.js -->
    <script src="bower_components/jquery/dist/jquery.min.js"></script>

    <!-- bootstrap.min.js -->
    <script src="bower_components/bootstrap/dist/js/bootstrap.min.js"></script>

    <!-- main.js -->
    <script src="assets/js/main.js"></script>
  </body>
</html>
